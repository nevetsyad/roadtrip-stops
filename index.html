<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Roadtrip Stops</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e4e4e7;
      min-height: 100vh;
      min-height: 100dvh;
    }

    #map {
      height: 40vh;
      width: 100%;
      z-index: 1;
    }

    .container {
      padding: 12px;
      padding-bottom: 100px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 8px;
    }

    .header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .trip-selector {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }

    .trip-select {
      background: #1a1d27;
      color: #e4e4e7;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 0.85rem;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .trip-btn {
      background: #1a1d27;
      color: #e4e4e7;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.85rem;
      cursor: pointer;
      flex-shrink: 0;
    }

    .trip-btn:active { background: #27272a; }

    .trip-stats {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      padding: 10px;
      background: #1a1d27;
      border-radius: 12px;
    }

    .stat {
      flex: 1;
      text-align: center;
    }

    .stat-value {
      font-size: 1.3rem;
      font-weight: 700;
      color: #60a5fa;
    }

    .stat-label {
      font-size: 0.65rem;
      color: #71717a;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .upload-area {
      margin-bottom: 12px;
    }

    .data-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .upload-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.2s;
    }

    .upload-btn:active { opacity: 0.8; }

    .data-btn {
      flex: 1;
      padding: 10px;
      background: #1a1d27;
      color: #e4e4e7;
      border: 1px solid #27272a;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }

    .data-btn:active { background: #27272a; }

    .upload-btn svg { width: 18px; height: 18px; }

    #fileInput { display: none; }

    .stops-list { display: flex; flex-direction: column; gap: 8px; }

    .stop-card {
      background: #1a1d27;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      gap: 12px;
      padding: 12px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .stop-thumb {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: #27272a;
    }

    .stop-info {
      flex: 1;
      min-width: 0;
    }

    .stop-name {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stop-meta {
      font-size: 0.75rem;
      color: #71717a;
    }

    .stop-distance {
      font-size: 0.75rem;
      color: #60a5fa;
      font-weight: 500;
    }

    .stop-actions {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }

    .stop-btn {
      background: none;
      border: none;
      color: #71717a;
      cursor: pointer;
      padding: 4px;
      font-size: 1rem;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .stop-btn:active { background: #27272a; }
    .stop-btn.delete { color: #ef4444; }
    .stop-btn.move { color: #71717a; }

    .empty-state {
      text-align: center;
      padding: 30px 20px;
      color: #52525b;
    }

    .empty-state svg {
      width: 40px;
      height: 40px;
      margin-bottom: 10px;
      opacity: 0.5;
    }

    .empty-state p { font-size: 0.85rem; }

    .loading {
      text-align: center;
      padding: 16px;
      color: #71717a;
      font-size: 0.85rem;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #27272a;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #27272a;
      color: #e4e4e7;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 0.85rem;
      z-index: 1000;
      animation: fadeInUp 0.3s ease;
      pointer-events: none;
      max-width: 90vw;
      text-align: center;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .leaflet-control-attribution { font-size: 9px !important; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="container">
    <div class="header">
      <h1>🗺️ Roadtrip Stops</h1>
      <div class="trip-selector">
        <select class="trip-select" id="tripSelect"></select>
        <button class="trip-btn" id="newTripBtn">+ New</button>
      </div>
    </div>

    <div class="trip-stats" id="tripStats" style="display: none;">
      <div class="stat">
        <div class="stat-value" id="totalMiles">0</div>
        <div class="stat-label">Total Miles</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stopCount">0</div>
        <div class="stat-label">Stops</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="estHours">0h</div>
        <div class="stat-label">Est. Drive</div>
      </div>
    </div>

    <div class="upload-area">
      <button class="upload-btn" id="uploadBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        Add Stop from Photo
      </button>
      <input type="file" id="fileInput" accept="image/heic,image/heif,image/jpeg,image/jpg,image/png,image/*" multiple>
      <input type="file" id="importInput" accept="application/json,.json" style="display:none">
      <div class="data-actions">
        <button class="data-btn" id="exportBtn">Export Trip</button>
        <button class="data-btn" id="importBtn">Import Trip</button>
      </div>
    </div>

    <div id="stopsList" class="stops-list">
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l5.447 2.724A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
        </svg>
        <p>Add photos from your trip to get started</p>
      </div>
    </div>
  </div>

  <script>
    // --- IndexedDB for photo storage ---
    const DB_NAME = 'roadtrip-stops-db';
    const DB_VERSION = 1;
    let db;

    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
          const database = e.target.result;
          if (!database.objectStoreNames.contains('photos')) {
            database.createObjectStore('photos', { keyPath: 'id' });
          }
        };
        request.onsuccess = (e) => {
          db = e.target.result;
          resolve(db);
        };
        request.onerror = (e) => reject(e.target.error);
      });
    }

    function savePhoto(id, blob) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction('photos', 'readwrite');
        tx.objectStore('photos').put({ id, blob });
        tx.oncomplete = () => resolve();
        tx.onerror = (e) => reject(e.target.error);
      });
    }

    function getPhoto(id) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction('photos', 'readonly');
        const request = tx.objectStore('photos').get(id);
        request.onsuccess = () => resolve(request.result ? request.result.blob : null);
        request.onerror = (e) => reject(e.target.error);
      });
    }

    function deletePhoto(id) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction('photos', 'readwrite');
        tx.objectStore('photos').delete(id);
        tx.oncomplete = () => resolve();
        tx.onerror = (e) => reject(e.target.error);
      });
    }

    // --- Trip Management ---
    const TRIPS_KEY = 'roadtrip-trips';

    function getTrips() {
      return JSON.parse(localStorage.getItem(TRIPS_KEY) || '{}');
    }

    function saveTrips(trips) {
      localStorage.setItem(TRIPS_KEY, JSON.stringify(trips));
    }

    function getCurrentTripId() {
      return localStorage.getItem('roadtrip-current-trip') || null;
    }

    function setCurrentTripId(id) {
      localStorage.setItem('roadtrip-current-trip', id);
    }

    function createTrip(name) {
      const trips = getTrips();
      const id = 'trip-' + Date.now();
      trips[id] = {
        id,
        name: name || 'Trip ' + (Object.keys(trips).length + 1),
        createdAt: new Date().toISOString(),
        stops: []
      };
      saveTrips(trips);
      setCurrentTripId(id);
      return trips[id];
    }

    function getTrip(id) {
      const trips = getTrips();
      return trips[id] || null;
    }

    async function deleteTrip(id) {
      const trips = getTrips();
      // Clean up photos
      const trip = trips[id];
      if (trip) {
        await Promise.all(trip.stops.map(stop => deletePhoto(stop.id)));
      }
      delete trips[id];
      saveTrips(trips);
    }

    function updateTripStops(tripId, stops) {
      const trips = getTrips();
      if (trips[tripId]) {
        trips[tripId].stops = stops.map(stop => {
          const { thumb, ...persistedStop } = stop;
          return persistedStop;
        });
        saveTrips(trips);
      }
    }

    // --- State ---
    let stops = [];
    let map, routeLayer, markersLayer;
    let segmentDistances = [];
    let segmentDurations = [];
    const thumbUrls = new Map();

    // --- Init ---
    async function init() {
      await openDB();
      initMap();
      setupTripUI();
      setupUpload();
      setupClear();
      loadCurrentTrip();
    }

    function initMap() {
      map = L.map('map', {
        center: [39.8, -98.5],
        zoom: 4,
        zoomControl: false,
        attributionControl: true
      });

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap',
        maxZoom: 19
      }).addTo(map);

      L.control.zoom({ position: 'topright' }).addTo(map);

      markersLayer = L.layerGroup().addTo(map);
      routeLayer = L.layerGroup().addTo(map);
    }

    // --- Trip UI ---
    function setupTripUI() {
      const select = document.getElementById('tripSelect');
      const newBtn = document.getElementById('newTripBtn');

      function renderTripSelect() {
        const trips = getTrips();
        const currentId = getCurrentTripId();
        select.innerHTML = '';

        Object.values(trips).forEach(trip => {
          const opt = document.createElement('option');
          opt.value = trip.id;
          opt.textContent = trip.name;
          if (trip.id === currentId) opt.selected = true;
          select.appendChild(opt);
        });
      }

      select.addEventListener('change', () => {
        setCurrentTripId(select.value);
        loadCurrentTrip();
      });

      newBtn.addEventListener('click', async () => {
        const name = prompt('Trip name:');
        if (name === null) return;
        const trip = createTrip(name);
        renderTripSelect();
        select.value = trip.id;
        setCurrentTripId(trip.id);
        loadCurrentTrip();
        showToast('Created "' + trip.name + '"');
      });

      renderTripSelect();
    }

    async function loadCurrentTrip() {
      const tripId = getCurrentTripId();
      if (!tripId) {
        // Create default trip
        const trip = createTrip('My Trip');
        document.getElementById('tripSelect').value = trip.id;
        setCurrentTripId(trip.id);
        stops = [];
      } else {
        const trip = getTrip(tripId);
        if (!trip) {
          stops = [];
        } else {
          stops = trip.stops.map(s => ({ ...s }));
        }
      }
      await renderStops();
    }

    // --- Upload ---
    function setupUpload() {
      const btn = document.getElementById('uploadBtn');
      const input = document.getElementById('fileInput');
      const importBtn = document.getElementById('importBtn');
      const importInput = document.getElementById('importInput');
      const exportBtn = document.getElementById('exportBtn');

      btn.addEventListener('click', () => input.click());
      input.addEventListener('change', handleFiles);
      exportBtn.addEventListener('click', exportCurrentTrip);
      importBtn.addEventListener('click', () => importInput.click());
      importInput.addEventListener('change', importTrip);
    }

    async function handleFiles(e) {
      const files = Array.from(e.target.files);
      if (!files.length) return;

      document.getElementById('emptyState')?.remove();

      for (const file of files) {
        await processFile(file);
      }

      e.target.value = '';
    }

    async function processFile(file) {
      const loadingEl = document.createElement('div');
      loadingEl.className = 'loading';
      loadingEl.innerHTML = '<span class="spinner"></span> Processing <strong>' + file.name + '</strong>...';
      document.getElementById('stopsList').prepend(loadingEl);

      try {
        // Extract EXIF data
        let exif = null;
        try {
          exif = await exifr.parse(file, {
            gps: true, exif: true, jpeg: true, heif: true,
            tiff: true, png: true, webp: true
          });
        } catch (e) {
          console.warn('EXIF parse failed:', e);
        }

        let lat, lng, name;

        if (exif && exif.latitude && exif.longitude) {
          lat = exif.latitude;
          lng = exif.longitude;
          name = await reverseGeocode(lat, lng);
        } else {
          name = prompt('No GPS data found. Enter location name:');
          if (!name) { loadingEl.remove(); return; }
          const coords = await geocode(name);
          if (!coords) {
            loadingEl.remove();
            alert('Could not find "' + name + '".');
            return;
          }
          lat = coords.lat;
          lng = coords.lng;
        }

        // Use EXIF timestamp for ordering
        let photoDate = null;
        if (exif?.created) {
          photoDate = new Date(exif.created).toISOString();
        } else if (file.lastModified) {
          photoDate = new Date(file.lastModified).toISOString();
        }

        // Duplicate detection: check GPS + timestamp tolerance
        const isDuplicate = stops.some(s => {
          const dist = haversine(s.lat, s.lng, lat, lng);
          const timeDiff = s.timestamp && photoDate ?
            Math.abs(new Date(s.timestamp) - new Date(photoDate)) : 0;
          // Within 50m and 5 minutes = duplicate
          return dist < 0.03 && timeDiff < 300000;
        });

        if (isDuplicate) {
          loadingEl.innerHTML = '⏭️ Skipped duplicate: <strong>' + file.name + '</strong>';
          loadingEl.style.color = '#f59e0b';
          setTimeout(() => loadingEl.remove(), 2000);
          return;
        }

        const stop = {
          id: 'stop-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5),
          name: name || 'Unknown Location',
          lat,
          lng,
          fileName: file.name,
          timestamp: photoDate,
          distance: 0,
          duration: 0,
          routeGeometry: null
        };

        // Save photo blob to IndexedDB
        await savePhoto(stop.id, file);
        setThumbUrl(stop, file);

        stops.push(stop);
        // Sort by timestamp (oldest first), then by id
        stops.sort((a, b) => {
          if (a.timestamp && b.timestamp) return new Date(a.timestamp) - new Date(b.timestamp);
          if (a.timestamp) return -1;
          if (b.timestamp) return 1;
          return a.id.localeCompare(b.id);
        });

        // Save trip data
        const tripId = getCurrentTripId();
        if (tripId) {
          updateTripStops(tripId, stops);
        }

        await renderStops();
        loadingEl.remove();

      } catch (err) {
        console.error('Error processing file:', err);
        loadingEl.innerHTML = '❌ Error processing <strong>' + file.name + '</strong>';
        loadingEl.style.color = '#ef4444';
      }
    }

    async function reverseGeocode(lat, lng) {
      try {
        const resp = await fetch(
          `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`,
          { headers: { 'User-Agent': 'RoadtripStops/1.0' } }
        );
        const data = await resp.json();
        if (data.display_name) {
          const addr = data.address;
          if (addr.road) return addr.road + (addr.neighbourhood ? ', ' + addr.neighbourhood : '');
          if (addr.city || addr.town || addr.village) return addr.city || addr.town || addr.village;
          return data.display_name.split(',').slice(0, 2).join(',');
        }
      } catch (e) {
        console.warn('Reverse geocode failed:', e);
      }
      return `Stop ${stops.length + 1}`;
    }

    async function geocode(query) {
      try {
        const resp = await fetch(
          `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`,
          { headers: { 'User-Agent': 'RoadtripStops/1.0' } }
        );
        const data = await resp.json();
        if (data.length > 0) {
          return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
        }
      } catch (e) {
        console.warn('Geocode failed:', e);
      }
      return null;
    }

    function setThumbUrl(stop, blob) {
      if (thumbUrls.has(stop.id)) URL.revokeObjectURL(thumbUrls.get(stop.id));
      const url = URL.createObjectURL(blob);
      thumbUrls.set(stop.id, url);
      stop.thumb = url;
      return url;
    }

    async function ensureThumbs() {
      await Promise.all(stops.map(async stop => {
        if (thumbUrls.has(stop.id)) {
          stop.thumb = thumbUrls.get(stop.id);
          return;
        }
        const blob = await getPhoto(stop.id);
        if (blob) setThumbUrl(stop, blob);
      }));
    }

    function routeKey(from, to) {
      return [from.lat, from.lng, to.lat, to.lng].map(n => Number(n).toFixed(5)).join(',');
    }

    function formatDuration(seconds) {
      if (!seconds) return '0h';
      const mins = Math.round(seconds / 60);
      if (mins < 60) return mins + 'm';
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      return m ? h + 'h ' + m + 'm' : h + 'h';
    }

    function addRouteToMap(route) {
      if (!route?.geometry) return;
      L.polyline(route.geometry, {
        color: '#3b82f6',
        weight: 4,
        opacity: 0.85,
        lineCap: 'round',
        lineJoin: 'round'
      }).addTo(routeLayer);
    }

    function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    async function dataUrlToBlob(dataUrl) {
      const resp = await fetch(dataUrl);
      return resp.blob();
    }

    async function exportCurrentTrip() {
      const tripId = getCurrentTripId();
      const trip = getTrip(tripId);
      if (!trip) return alert('No trip to export.');

      const exportStops = await Promise.all(trip.stops.map(async stop => {
        const { thumb, ...cleanStop } = stop;
        const blob = await getPhoto(stop.id);
        return {
          ...cleanStop,
          photoDataUrl: blob ? await blobToDataUrl(blob) : null
        };
      }));

      const payload = {
        app: 'roadtrip-stops',
        version: 1,
        exportedAt: new Date().toISOString(),
        trip: { ...trip, stops: exportStops }
      };

      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (trip.name || 'roadtrip').replace(/[^a-z0-9-_]+/gi, '-').toLowerCase() + '.roadtrip.json';
      a.click();
      URL.revokeObjectURL(url);
      showToast('Exported "' + trip.name + '"');
    }

    async function importTrip(e) {
      const file = e.target.files?.[0];
      if (!file) return;

      try {
        const payload = JSON.parse(await file.text());
        const imported = payload.trip || payload;
        if (!imported.name || !Array.isArray(imported.stops)) throw new Error('Invalid trip file');

        const trips = getTrips();
        const id = 'trip-' + Date.now();
        const importedStops = [];

        for (const stop of imported.stops) {
          const { photoDataUrl, thumb, ...cleanStop } = stop;
          const newStop = {
            ...cleanStop,
            id: 'stop-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5)
          };
          importedStops.push(newStop);
          if (photoDataUrl) {
            const blob = await dataUrlToBlob(photoDataUrl);
            await savePhoto(newStop.id, blob);
            setThumbUrl(newStop, blob);
          }
        }

        trips[id] = {
          id,
          name: imported.name + ' (Imported)',
          createdAt: new Date().toISOString(),
          stops: importedStops
        };
        saveTrips(trips);
        setCurrentTripId(id);
        stops = importedStops;

        const select = document.getElementById('tripSelect');
        const opt = document.createElement('option');
        opt.value = id;
        opt.textContent = trips[id].name;
        opt.selected = true;
        select.appendChild(opt);

        await renderStops();
        showToast('Imported "' + imported.name + '"');
      } catch (err) {
        console.error('Import failed:', err);
        alert('Could not import this trip file.');
      } finally {
        e.target.value = '';
      }
    }

    async function renderStops() {
      const list = document.getElementById('stopsList');
      const stats = document.getElementById('tripStats');

      // Clear existing
      markersLayer.clearLayers();
      routeLayer.clearLayers();

      if (stops.length === 0) {
        list.innerHTML = `
          <div class="empty-state" id="emptyState">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l5.447 2.724A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
            </svg>
            <p>Add photos from your trip to get started</p>
          </div>`;
        stats.style.display = 'none';
        return;
      }

      stats.style.display = 'flex';
      await ensureThumbs();

      // Render stop cards
      let html = '';
      const bounds = L.latLngBounds();
      segmentDistances = [];
      segmentDurations = [];

      stops.forEach((stop, i) => {
        const haversineDist = i > 0 ? haversine(stops[i-1].lat, stops[i-1].lng, stop.lat, stop.lng) : 0;
        segmentDistances.push(haversineDist);

        html += `
          <div class="stop-card" data-id="${stop.id}">
            <img class="stop-thumb" src="${stop.thumb}" alt="${stop.name}">
            <div class="stop-info">
              <div class="stop-name">${escapeHtml(stop.name)}</div>
              <div class="stop-meta">#${i + 1} · ${stop.lat.toFixed(4)}, ${stop.lng.toFixed(4)}</div>
              ${stop.timestamp ? '<div class="stop-meta">' + new Date(stop.timestamp).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) + '</div>' : ''}
              <div class="stop-distance" id="dist-${i}">${i === 0 ? 'Start' : (stop.distance ? stop.distance : '<span class="spinner" style="width:12px;height:12px;display:inline-block;vertical-align:middle;margin-right:4px;"></span> routing...')}</div>
            </div>
            <div class="stop-actions">
              <button class="stop-btn move" onclick="moveStop(${i}, -1)" title="Move up">↑</button>
              <button class="stop-btn move" onclick="moveStop(${i}, 1)" title="Move down">↓</button>
              <button class="stop-btn delete" onclick="deleteStop(${i})" title="Delete">✕</button>
            </div>
          </div>`;

        // Add marker
        const marker = L.marker([stop.lat, stop.lng])
          .bindPopup(`<strong>${escapeHtml(stop.name)}</strong><br>#${i + 1}`)
          .addTo(markersLayer);

        bounds.extend([stop.lat, stop.lng]);
      });

      list.innerHTML = html;

      // Fetch actual driving routes from OSRM
      if (stops.length > 1) {
        await drawDrivingRoutes(stops);
      }

      // Fit map
      if (stops.length === 1) {
        map.setView([stops[0].lat, stops[0].lng], 14);
      } else {
        map.fitBounds(bounds, { padding: [40, 40] });
      }

      // Update stats
      const totalMiles = segmentDistances.reduce((a, b) => a + b, 0);
      const totalSeconds = segmentDurations.reduce((a, b) => a + b, 0);
      document.getElementById('totalMiles').textContent = formatDistance(totalMiles);
      document.getElementById('stopCount').textContent = stops.length;
      document.getElementById('estHours').textContent = totalSeconds ? formatDuration(totalSeconds) : Math.round(totalMiles / 55) + 'h';
    }

    async function drawDrivingRoutes(stops) {
      const routePromises = [];
      for (let i = 0; i < stops.length - 1; i++) {
        const from = stops[i];
        const to = stops[i + 1];
        routePromises.push(fetchOSRMRoute(from.lat, from.lng, to.lat, to.lng, i));
      }
      await Promise.all(routePromises);
    }

    async function fetchOSRMRoute(lat1, lng1, lat2, lng2, segmentIndex) {
      const from = stops[segmentIndex];
      const to = stops[segmentIndex + 1];
      const key = from && to ? routeKey(from, to) : null;

      if (to?.routeCache?.key === key) {
        segmentDistances[segmentIndex + 1] = to.routeCache.miles;
        segmentDurations[segmentIndex + 1] = to.routeCache.duration || 0;
        addRouteToMap(to.routeCache);
        const distEl = document.getElementById('dist-' + (segmentIndex + 1));
        if (distEl) distEl.innerHTML = formatDistance(to.routeCache.miles);
        return;
      }

      try {
        const url = `https://router.project-osrm.org/route/v1/driving/${lng1},${lat1};${lng2},${lat2}?overview=full&geometries=geojson&steps=false`;
        const resp = await fetch(url);
        const data = await resp.json();

        if (data.code === 'Ok' && data.routes.length > 0) {
          const route = data.routes[0];
          const coords = route.geometry.coordinates.map(c => [c[1], c[0]]);
          const miles = route.distance / 1609.34;
          const cachedRoute = { key, miles, duration: route.duration || 0, geometry: coords };
          addRouteToMap(cachedRoute);

          segmentDistances[segmentIndex + 1] = miles;
          segmentDurations[segmentIndex + 1] = route.duration || 0;

          // Update stop card
          const distEl = document.getElementById('dist-' + (segmentIndex + 1));
          if (distEl) {
            distEl.innerHTML = formatDistance(miles);
          }

          // Update stop data
          if (to) {
            to.distance = formatDistance(miles);
            to.duration = route.duration || 0;
            to.routeCache = cachedRoute;
          }

          // Save updated trip
          const tripId = getCurrentTripId();
          if (tripId) {
            updateTripStops(tripId, stops);
          }
        } else {
          const haversineDist = haversine(lat1, lng1, lat2, lng2);
          segmentDistances[segmentIndex + 1] = haversineDist;
          const distEl = document.getElementById('dist-' + (segmentIndex + 1));
          if (distEl) {
            distEl.innerHTML = formatDistance(haversineDist);
          }
        }
      } catch (err) {
        console.warn('OSRM route failed for segment', segmentIndex, err);
        const distEl = document.getElementById('dist-' + (segmentIndex + 1));
        if (distEl) {
          distEl.innerHTML = '⚠️ routing failed';
        }
      }
    }

    function moveStop(index, direction) {
      const newIndex = index + direction;
      if (newIndex < 0 || newIndex >= stops.length) return;
      [stops[index], stops[newIndex]] = [stops[newIndex], stops[index]];
      const tripId = getCurrentTripId();
      if (tripId) updateTripStops(tripId, stops);
      renderStops();
    }

    async function deleteStop(index) {
      if (!confirm('Delete this stop?')) return;
      const stop = stops[index];
      stops.splice(index, 1);
      // Clean up photo
      await deletePhoto(stop.id);
      const tripId = getCurrentTripId();
      if (tripId) updateTripStops(tripId, stops);
      renderStops();
    }

    function setupClear() {
      // Clear button is handled via trip deletion
    }

    function haversine(lat1, lon1, lat2, lon2) {
      const R = 3958.8;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function formatDistance(miles) {
      if (miles < 1) return Math.round(miles * 5280) + 'ft';
      if (miles < 10) return miles.toFixed(1) + ' mi';
      return Math.round(miles) + ' mi';
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2500);
    }

    // Start
    init().catch(console.error);
  </script>
</body>
</html>
